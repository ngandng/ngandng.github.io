baseURL = 'https://ngandng.github.io'
title = 'Ngan'

# multi-language support
defaultContentLanguage = 'en'

# enable git info
enableGitInfo = true

# disable taxonomy, term and RSS (which removes categories, tags and index.xml)
disableKinds = ["taxonomy", "term", "RSS"]

[module]
  [[module.imports]]
    path = 'github.com/geekifan/zero-academic-page'

[languages]
  [languages.en]
    languageName = 'English'
    weight = 1
    title = 'Zero'

    [languages.en.params]
      author = "Lorem ipsum"
      description = "Ph.D Student in Computing and Data Science."
      motto = "Most things in the world are not that important. But truth and love matter."
    
    [[languages.en.menu.main]]
      name = 'About Me'
      url = '#about-me'
      weight = 1
    [[languages.en.menu.main]]
      name = 'News'
      url = '#news'
      weight = 2
    [[languages.en.menu.main]]
      name = 'Publications'
      url = '#publications'
      weight = 3
    [[languages.en.menu.main]]
      name = 'Honors and Awards'
      url = '#honors-and-awards'
      weight = 4
    [[languages.en.menu.main]]
      name = 'Educations'
      url = '#educations'
      weight = 5
    [[languages.en.menu.main]]
      name = 'Invited Talks'
      url = '#invited-talks'
      weight = 6
    [[languages.en.menu.main]]
      name = 'Internships'
      url = '#internships'
      weight = 7

    [[languages.en.menu.main]]
      name = 'Photos'
      url = '/photo'
      weight = 8


[params]
  profilePicture = "images/gif1.gif"
  enableDarkMode = true
  
  [[params.social]]
    name = "github"
    url = "https://github.com/ngandng"
    icon = "fab fa-github"
  [[params.social]]
    name = "google-scholar"
    url = "https://scholar.google.com/citations?user=NchD9VIAAAAJ&hl=en"
    icon = "fab fa-google-scholar"
  [[params.social]]
    name = "email"
    url = "mailto:ngan.uet@gmail.com"
    icon = "fas fa-envelope"
  [[params.social]]
    name = "linkedin"
    url = "https://www.linkedin.com/in/dttngaan/"
    icon = "fab fa-linkedin"
  [[params.social]]
    name = "ORCID"
    url = "https://orcid.org/0009-0005-9768-7084"
    icon = "fab fa-orcid"

[build]
  writeStats = false

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
